name = "spletne-strani-slovenija-token-gate"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace binding: token → site slug mapping
# Create with: wrangler kv:namespace create TOKENS
# Then update the id below with the actual namespace id
[[kv_namespaces]]
binding = "TOKENS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# Routes: Worker handles all requests to spletne-strani-slovenija.pages.dev
# (This is a fallback configuration; in production CF Pages integrates Workers differently)
#
# When deployed as a Pages Function (recommended for production), place this
# file as functions/_middleware.js in the Pages project and remove the routes section.
#
# For separate Worker (alternative), uncomment routes:
# routes = [
#   { pattern = "spletne-strani-slovenija.pages.dev/*", custom_domain = true }
# ]
